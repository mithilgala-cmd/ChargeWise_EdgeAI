<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="blue-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="purple-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .layer-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #F1F5F9; text-transform: uppercase; letter-spacing: 0.05em; }
    .node-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #F1F5F9; }
    .node-subtext { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .label { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #64748B; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <g opacity="0.05">
    <path d="M 0,100 L 1000,100 M 0,200 L 1000,200 M 0,300 L 1000,300 M 0,400 L 1000,400 M 0,500 L 1000,500 M 0,600 L 1000,600" stroke="#FFFFFF" stroke-width="1"/>
    <path d="M 150,0 L 150,650 M 300,0 L 300,650 M 450,0 L 450,650 M 600,0 L 600,650 M 750,0 L 750,650 M 900,0 L 900,650" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — System Architecture</text>
  <text x="40" y="72" class="subtitle">Decentralized Hybrid Edge-Cloud EV Charging &amp; Battery Health Optimizer</text>

  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="260" height="480" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="260" height="35" rx="12" fill="url(#blue-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="260" y2="35" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="15" y="23" class="layer-title" fill="#3B82F6">1. Telemetry Layer</text>

    <g transform="translate(15, 60)">
      <rect width="230" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#3B82F6" opacity="0.2"/>
      <path d="M 20,40 L 30,40 M 25,35 L 25,45" stroke="#3B82F6" stroke-width="2"/>
      <text x="50" y="35" class="node-text">CAN-Bus / OBD-II Interface</text>
      <text x="50" y="52" class="node-subtext">Extracts raw cell telemetry</text>
      <text x="50" y="65" class="node-subtext">Voltage, current, temperatures</text>
    </g>

    <g transform="translate(15, 160)">
      <rect width="230" height="70" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="35" r="12" fill="#3B82F6" opacity="0.2"/>
      <path d="M 25,27 L 33,38 L 25,34 L 17,38 z" fill="#3B82F6"/>
      <text x="50" y="32" class="node-text">GPS Receiver Module</text>
      <text x="50" y="49" class="node-subtext">Velocity &amp; Geo-coordinates</text>
      <text x="50" y="61" class="node-subtext">Updated at 1 Hz intervals</text>
    </g>

    <g transform="translate(15, 250)">
      <rect width="230" height="70" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="35" r="12" fill="#3B82F6" opacity="0.2"/>
      <path d="M 20,35 Q 25,25 30,35 Q 25,45 20,35 z" fill="#3B82F6"/>
      <text x="50" y="32" class="node-text">Physical Sensors</text>
      <text x="50" y="49" class="node-subtext">Ambient temperature sensor</text>
      <text x="50" y="61" class="node-subtext">Individual cell temperature probes</text>
    </g>

    <g transform="translate(15, 340)">
      <rect width="230" height="120" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="35" r="12" fill="#3B82F6" opacity="0.2"/>
      <path d="M 21,30 L 29,30 L 29,40 L 21,40 z" fill="#3B82F6"/>
      <text x="50" y="32" class="node-text">External API Feeds</text>
      <text x="50" y="49" class="node-subtext">• TomTom Live Traffic API</text>
      <text x="50" y="64" class="node-subtext">• OpenWeather API (Ambient conditions)</text>
      <text x="50" y="79" class="node-subtext">• OpenChargeMap Station Status API</text>
    </g>
  </g>

  <g transform="translate(370, 110)" filter="url(#shadow)">
    <rect width="260" height="480" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="260" height="35" rx="12" fill="url(#green-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="260" y2="35" stroke="#10B981" stroke-width="1.5"/>
    <text x="15" y="23" class="layer-title" fill="#10B981">2. Onboard Edge Layer</text>

    <g transform="translate(15, 60)">
      <rect width="230" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#10B981" opacity="0.2"/>
      <path d="M 18,33 C 18,30 32,30 32,33 M 18,33 L 18,47 C 18,50 32,50 32,47 L 32,33 M 18,40 C 18,43 32,43 32,40" stroke="#10B981" stroke-width="1.5" fill="none"/>
      <text x="50" y="35" class="node-text">Local SQLite Telemetry DB</text>
      <text x="50" y="52" class="node-subtext">Circular log buffer (downsampled)</text>
      <text x="50" y="65" class="node-subtext">Stores SOH calibration profiles</text>
    </g>

    <g transform="translate(15, 160)">
      <rect width="230" height="90" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="45" r="12" fill="#10B981" opacity="0.2"/>
      <path d="M 25,35 L 32,45 L 18,45 z" fill="#10B981"/>
      <text x="50" y="32" class="node-text">TFLite Inference Engine</text>
      <text x="50" y="49" class="node-subtext">Runs SOH LSTM &amp; XGBoost</text>
      <text x="50" y="62" class="node-subtext">quantized models locally</text>
      <text x="50" y="75" class="node-subtext">Latency: &lt; 20 ms</text>
    </g>

    <g transform="translate(15, 270)">
      <rect width="230" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#10B981" opacity="0.2"/>
      <path d="M 25,32 L 31,43 L 19,43 z" fill="#10B981"/>
      <text x="50" y="35" class="node-text">Thermal &amp; SOH Guardrails</text>
      <text x="50" y="52" class="node-subtext">Active C-rate throttling rules</text>
      <text x="50" y="65" class="node-subtext">Thermal runaway emergency flags</text>
    </g>

    <g transform="translate(15, 370)">
      <rect width="230" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#10B981" opacity="0.2"/>
      <path d="M 20,40 H 30 M 23,37 L 20,40 L 23,43 M 27,37 L 30,40 L 27,43" stroke="#10B981" stroke-width="1.5" fill="none"/>
      <text x="50" y="35" class="node-text">Sync Manager (SQLite-Cloud)</text>
      <text x="50" y="52" class="node-subtext">Queues data packets when offline</text>
      <text x="50" y="65" class="node-subtext">Syncs to Firestore on connection</text>
    </g>
  </g>

  <g transform="translate(700, 110)" filter="url(#shadow)">
    <rect width="260" height="225" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="260" height="35" rx="12" fill="url(#purple-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="260" y2="35" stroke="#6366F1" stroke-width="1.5"/>
    <text x="15" y="23" class="layer-title" fill="#6366F1">3. Cloud / Persistence</text>

    <g transform="translate(15, 60)">
      <rect width="230" height="135" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#6366F1" opacity="0.2"/>
      <path d="M 21,32 C 17,35 17,45 21,48 C 25,51 29,48 29,48" stroke="#6366F1" stroke-width="2" fill="none"/>
      <text x="50" y="35" class="node-text">Firebase Cloud Firestore</text>
      <text x="50" y="52" class="node-subtext">Central User Profile repository</text>
      <text x="50" y="67" class="node-subtext">Global Charging Station Index</text>
      <text x="50" y="82" class="node-subtext">Fleet telemetry aggregation for</text>
      <text x="50" y="97" class="node-subtext">continuous model training</text>
    </g>
  </g>

  <g transform="translate(700, 365)" filter="url(#shadow)">
    <rect width="260" height="225" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="260" height="35" rx="12" fill="url(#purple-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="260" y2="35" stroke="#6366F1" stroke-width="1.5"/>
    <text x="15" y="23" class="layer-title" fill="#6366F1">4. Application Layer</text>

    <g transform="translate(15, 60)">
      <rect width="230" height="135" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="40" r="12" fill="#6366F1" opacity="0.2"/>
      <path d="M 21,32 H 29 V 48 H 21 Z" stroke="#6366F1" stroke-width="1.5" fill="none"/>
      <text x="50" y="35" class="node-text">Mobile Companion App</text>
      <text x="50" y="52" class="node-subtext">React Native / Flutter dashboard</text>
      <text x="50" y="67" class="node-subtext">Displays recommended charger stops</text>
      <text x="50" y="82" class="node-subtext">Shows SOH metrics and active</text>
      <text x="50" y="97" class="node-subtext">thermal warnings to driver</text>
    </g>
  </g>

  <path d="M 300,185 L 370,185" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="315" y="177" class="label" fill="#3B82F6">CAN DATA</text>

  <path d="M 300,285 L 370,285" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="323" y="277" class="label" fill="#3B82F6">GPS/API</text>

  <path d="M 600,520 L 670,520 L 670,280 L 700,280" stroke="#10B981" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-green)"/>
  <text x="618" y="295" class="label" fill="#10B981">OFFLINE SYNC</text>

  <path d="M 600,425 Q 650,425 650,450 T 700,450" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="615" y="442" class="label" fill="#10B981">BLE/WiFi LINK</text>

  <path d="M 830,335 L 830,365" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="840" y="352" class="label">CLOUD DATA</text>
</svg>
