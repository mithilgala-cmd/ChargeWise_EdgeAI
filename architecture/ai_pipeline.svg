<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="blue-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="purple-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .group-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #F1F5F9; text-transform: uppercase; letter-spacing: 0.05em; }
    .node-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #F1F5F9; }
    .node-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .label { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #475569; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — Machine Learning Pipeline</text>
  <text x="40" y="72" class="subtitle">Closed-Loop Hybrid Pipeline: Centralized Model Training and Optimized Local Inference</text>

  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="920" height="200" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="920" height="35" rx="12" fill="url(#purple-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="920" y2="35" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="15" y="23" class="group-title" fill="#A78BFA">Cloud Layer: Model Engineering &amp; Optimization</text>

    <g transform="translate(15, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#8B5CF6" opacity="0.2"/>
      <path d="M 21,27 Q 25,23 29,27" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="45" y="27" class="node-title">1. Fleet Ingestion</text>
      <text x="15" y="55" class="node-text">• Aggregates battery logs</text>
      <text x="15" y="70" class="node-text">• Formats Charge profiles</text>
      <text x="15" y="85" class="node-text">• Syncs via Cloud Firestore</text>
    </g>

    <g transform="translate(245, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#8B5CF6" opacity="0.2"/>
      <path d="M 20,25 L 30,35 M 30,25 L 20,35" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="45" y="27" class="node-title">2. Centralized Training</text>
      <text x="15" y="55" class="node-text">• LSTM: SOH Degradation</text>
      <text x="15" y="70" class="node-text">• XGBoost: Tariff Forecast</text>
      <text x="15" y="85" class="node-text">• Loss evaluation (RMSE)</text>
    </g>

    <g transform="translate(475, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#8B5CF6" opacity="0.2"/>
      <path d="M 21,30 H 29" fill="none" stroke="#8B5CF6" stroke-width="2"/>
      <text x="45" y="27" class="node-title">3. Model Quantization</text>
      <text x="15" y="55" class="node-text">• Post-Training Quant (PTQ)</text>
      <text x="15" y="70" class="node-text">• Converts weights to INT8</text>
      <text x="15" y="85" class="node-text">• Decreases size: 18MB &gt; 4MB</text>
    </g>

    <g transform="translate(705, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#8B5CF6" opacity="0.2"/>
      <path d="M 25,23 L 29,32 L 21,32 Z" fill="#8B5CF6"/>
      <text x="45" y="27" class="node-title">4. OTA Packaging</text>
      <text x="15" y="55" class="node-text">• Generates TFLite binary</text>
      <text x="15" y="70" class="node-text">• Packs into docker images</text>
      <text x="15" y="85" class="node-text">• Deploys via cellular OTA</text>
    </g>
  </g>

  <path d="M 255,225 H 285" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 485,225 H 515" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 715,225 H 745" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(40, 360)" filter="url(#shadow)">
    <rect width="920" height="200" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="920" height="35" rx="12" fill="url(#green-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="920" y2="35" stroke="#10B981" stroke-width="1.5"/>
    <text x="15" y="23" class="group-title" fill="#34D399">Edge Layer: Local Real-Time Execution</text>

    <g transform="translate(15, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#10B981" opacity="0.2"/>
      <path d="M 25,23 V 37" stroke="#10B981" stroke-width="2"/>
      <text x="45" y="27" class="node-title">5. Sensor Buffer</text>
      <text x="15" y="55" class="node-text">• CAN-bus live streams</text>
      <text x="15" y="70" class="node-text">• Local SQLite FIFO buffer</text>
      <text x="15" y="85" class="node-text">• Downsampled to 0.2 Hz</text>
    </g>

    <g transform="translate(245, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#10B981" opacity="0.2"/>
      <path d="M 21,30 L 25,25 L 29,30 Z" fill="#10B981"/>
      <text x="45" y="27" class="node-title">6. Edge Interpreter</text>
      <text x="15" y="55" class="node-text">• Loads quantized model</text>
      <text x="15" y="70" class="node-text">• Latency SOH LSTM: 18ms</text>
      <text x="15" y="85" class="node-text">• Zero cloud dependencies</text>
    </g>

    <g transform="translate(475, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#10B981" opacity="0.2"/>
      <path d="M 20,35 Q 25,25 30,35" fill="none" stroke="#10B981" stroke-width="1.5"/>
      <text x="45" y="27" class="node-title">7. Safety Guardrails</text>
      <text x="15" y="55" class="node-text">• High temperature checks</text>
      <text x="15" y="70" class="node-text">• Active C-rate safety caps</text>
      <text x="15" y="85" class="node-text">• Thermal emergency alerts</text>
    </g>

    <g transform="translate(705, 60)">
      <rect width="200" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <circle cx="25" cy="30" r="10" fill="#10B981" opacity="0.2"/>
      <path d="M 25,23 C 17,23 17,37 25,37 C 33,37 33,23 25,23 Z" fill="none" stroke="#10B981" stroke-width="1.5"/>
      <text x="45" y="27" class="node-title">8. Driver Dashboard</text>
      <text x="15" y="55" class="node-text">• Displays charging recommendation</text>
      <text x="15" y="70" class="node-text">• Logs driver Accept/Reject</text>
      <text x="15" y="85" class="node-text">• Sinks telemetry offline</text>
    </g>
  </g>

  <path d="M 255,475 H 285" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 485,475 H 515" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <path d="M 715,475 H 745" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M 845,280 V 390 L 345,390 V 415" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow)"/>
  <text x="540" y="380" class="label" fill="#8B5CF6">OTA DEPLOYMENT</text>

  <path d="M 140,475 V 590 H 800 V 570" stroke="#10B981" stroke-width="2" fill="none"/>
  <path d="M 800,570 H 140 V 280 H 140 V 230" stroke="#10B981" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="420" y="583" class="label" fill="#10B981">TELEMETRY &amp; ACTION SYNC LOOP</text>
</svg>
