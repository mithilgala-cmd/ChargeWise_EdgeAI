<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="blue-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="red-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .node-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #F1F5F9; text-anchor: middle; }
    .node-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 10px; fill: #94A3B8; text-anchor: middle; }
    .decision-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 700; fill: #EF4444; text-anchor: middle; }
    .label { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #94A3B8; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — User Journey Flowchart</text>
  <text x="40" y="72" class="subtitle">Driver Interaction States, Onboard Edge Decisions, and Optimization Feedback Loops</text>

  <g transform="translate(100, 180)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="30" fill="url(#card-grad)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title">Driver App Open</text>
    <text x="0" y="10" class="node-text">Initializes Bluetooth Link</text>
  </g>

  <g transform="translate(300, 180)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="url(#card-grad)" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-5" class="node-title">Enter Destination</text>
    <text x="0" y="10" class="node-text">Queries Route Vectors</text>
  </g>

  <g transform="translate(500, 180)" filter="url(#shadow)">
    <polygon points="0,-40 70,0 0,40 -70,0" fill="url(#card-grad)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" font-size="11">SoC &gt; Est. Range?</text>
    <text x="0" y="10" class="node-text" font-size="9">Local Computation</text>
  </g>

  <g transform="translate(700, 180)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="url(#card-grad)" stroke="#10B981" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" fill="#10B981">Navigate Directly</text>
    <text x="0" y="10" class="node-text">No charging stops required</text>
  </g>

  <g transform="translate(500, 340)" filter="url(#shadow)">
    <polygon points="0,-40 70,0 0,40 -70,0" fill="url(#card-grad)" stroke="#EF4444" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" font-size="11" fill="#EF4444">Thermal Alarm?</text>
    <text x="0" y="10" class="node-text" font-size="9">Temp Rise &gt; 0.5°C/s</text>
  </g>

  <g transform="translate(700, 340)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="url(#card-grad)" stroke="#EF4444" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" fill="#EF4444">Safety Guardrail</text>
    <text x="0" y="10" class="node-text">Throttle charge rates / cool stop</text>
  </g>

  <g transform="translate(500, 480)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="url(#card-grad)" stroke="#10B981" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" fill="#10B981">Compute Optimizations</text>
    <text x="0" y="10" class="node-text">Min cost &amp; health wear plan</text>
  </g>

  <g transform="translate(300, 480)" filter="url(#shadow)">
    <polygon points="0,-40 70,0 0,40 -70,0" fill="url(#card-grad)" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="0" y="-5" class="node-title" font-size="11">Accept Plan?</text>
    <text x="0" y="10" class="node-text" font-size="9">Displaying 15-min stop</text>
  </g>

  <g transform="translate(100, 480)" filter="url(#shadow)">
    <rect x="-80" y="-30" width="160" height="60" rx="8" fill="url(#card-grad)" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-5" class="node-title">Sync Profile Logs</text>
    <text x="0" y="10" class="node-text">Refines ML user preference</text>
  </g>

  <path d="M 180,180 H 214" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M 380,180 H 424" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M 570,180 H 614" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="590" y="172" class="label" fill="#10B981">YES</text>

  <path d="M 500,220 V 294" stroke="#EF4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="510" y="250" class="label" fill="#EF4444">NO</text>

  <path d="M 570,340 H 614" stroke="#EF4444" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="590" y="332" class="label" fill="#EF4444">YES</text>

  <path d="M 500,380 V 444" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="510" y="410" class="label" fill="#10B981">NO</text>

  <path d="M 420,480 H 376" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>

  <path d="M 230,480 H 186" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="210" y="472" class="label" fill="#10B981">YES</text>

  <path d="M 300,440 V 216" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow)"/>
  <text x="285" y="310" class="label" fill="#EF4444">NO</text>
</svg>
