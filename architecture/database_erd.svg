<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="header-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="header-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="header-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .table-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #F8FAFC; text-transform: uppercase; letter-spacing: 0.05em; }
    .col-name { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 11px; font-weight: 600; fill: #E2E8F0; }
    .col-type { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 10px; fill: #64748B; }
    .col-key { font-family: 'system-ui', -apple-system, sans-serif; font-size: 9px; font-weight: 700; fill: #F59E0B; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — Database Schema ERD</text>
  <text x="40" y="72" class="subtitle">Relational mapping for local SQLite Cache &amp; Cloud Database Sync</text>

  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="210" height="110" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="210" height="28" rx="8" fill="url(#header-blue)"/>
    <rect y="20" width="210" height="8" fill="url(#header-blue)"/>
    <text x="12" y="18" class="table-title">users</text>
    
    <text x="12" y="48" class="col-name">id</text>
    <text x="90" y="48" class="col-type">VARCHAR(36)</text>
    <text x="180" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">name</text>
    <text x="90" y="68" class="col-type">VARCHAR(100)</text>

    <text x="12" y="88" class="col-name">email</text>
    <text x="90" y="88" class="col-type">VARCHAR(100)</text>
    <text x="180" y="88" class="col-key" fill="#6366F1">UK</text>
  </g>

  <g transform="translate(40, 270)" filter="url(#shadow)">
    <rect width="210" height="190" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="210" height="28" rx="8" fill="url(#header-blue)"/>
    <rect y="20" width="210" height="8" fill="url(#header-blue)"/>
    <text x="12" y="18" class="table-title">vehicles</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">VARCHAR(36)</text>
    <text x="180" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">user_id</text>
    <text x="95" y="68" class="col-type">VARCHAR(36)</text>
    <text x="180" y="68" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="88" class="col-name">make</text>
    <text x="95" y="88" class="col-type">VARCHAR(50)</text>

    <text x="12" y="108" class="col-name">model</text>
    <text x="95" y="108" class="col-type">VARCHAR(50)</text>

    <text x="12" y="128" class="col-name">year</text>
    <text x="95" y="128" class="col-type">INTEGER</text>

    <text x="12" y="148" class="col-name">battery_cap</text>
    <text x="95" y="148" class="col-type">DECIMAL(5,2)</text>

    <text x="12" y="168" class="col-name">odometer</text>
    <text x="95" y="168" class="col-type">DECIMAL(10,2)</text>
  </g>

  <g transform="translate(40, 500)" filter="url(#shadow)">
    <rect width="210" height="130" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="210" height="28" rx="8" fill="url(#header-green)"/>
    <rect y="20" width="210" height="8" fill="url(#header-green)"/>
    <text x="12" y="18" class="table-title">battery_logs</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">INTEGER</text>
    <text x="180" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">vehicle_id</text>
    <text x="95" y="68" class="col-type">VARCHAR(36)</text>
    <text x="180" y="68" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="88" class="col-name">soc / soh</text>
    <text x="95" y="88" class="col-type">DECIMAL(5,2)</text>

    <text x="12" y="108" class="col-name">temp_max</text>
    <text x="95" y="108" class="col-type">DECIMAL(4,1)</text>
  </g>

  <g transform="translate(390, 110)" filter="url(#shadow)">
    <rect width="220" height="150" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="220" height="28" rx="8" fill="url(#header-blue)"/>
    <rect y="20" width="220" height="8" fill="url(#header-blue)"/>
    <text x="12" y="18" class="table-title">charging_stations</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">VARCHAR(36)</text>
    <text x="185" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">name</text>
    <text x="95" y="68" class="col-type">VARCHAR(150)</text>

    <text x="12" y="88" class="col-name">coords(lat,lng)</text>
    <text x="95" y="88" class="col-type">DECIMAL(9,6)</text>

    <text x="12" y="108" class="col-name">max_power</text>
    <text x="95" y="108" class="col-type">DECIMAL(5,2)</text>

    <text x="12" y="128" class="col-name">base_tariff</text>
    <text x="95" y="128" class="col-type">DECIMAL(6,2)</text>
  </g>

  <g transform="translate(390, 310)" filter="url(#shadow)">
    <rect width="220" height="230" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="220" height="28" rx="8" fill="url(#header-purple)"/>
    <rect y="20" width="220" height="8" fill="url(#header-purple)"/>
    <text x="12" y="18" class="table-title">charging_sessions</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">VARCHAR(36)</text>
    <text x="185" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">vehicle_id</text>
    <text x="95" y="68" class="col-type">VARCHAR(36)</text>
    <text x="185" y="68" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="88" class="col-name">station_id</text>
    <text x="95" y="88" class="col-type">VARCHAR(36)</text>
    <text x="185" y="88" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="108" class="col-name">start_time</text>
    <text x="95" y="108" class="col-type">TIMESTAMP</text>

    <text x="12" y="128" class="col-name">end_time</text>
    <text x="95" y="128" class="col-type">TIMESTAMP</text>

    <text x="12" y="148" class="col-name">energy_kwh</text>
    <text x="95" y="148" class="col-type">DECIMAL(5,2)</text>

    <text x="12" y="168" class="col-name">cost</text>
    <text x="95" y="168" class="col-type">DECIMAL(8,2)</text>

    <text x="12" y="188" class="col-name">temp_max</text>
    <text x="95" y="188" class="col-type">DECIMAL(4,1)</text>

    <text x="12" y="208" class="col-name">health_wear</text>
    <text x="95" y="208" class="col-type">DECIMAL(4,2)</text>
  </g>

  <g transform="translate(730, 110)" filter="url(#shadow)">
    <rect width="230" height="230" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="230" height="28" rx="8" fill="url(#header-purple)"/>
    <rect y="20" width="230" height="8" fill="url(#header-purple)"/>
    <text x="12" y="18" class="table-title">recommendation_logs</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">VARCHAR(36)</text>
    <text x="195" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">vehicle_id</text>
    <text x="95" y="68" class="col-type">VARCHAR(36)</text>
    <text x="195" y="68" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="88" class="col-name">rec_station_id</text>
    <text x="95" y="88" class="col-type">VARCHAR(36)</text>
    <text x="195" y="88" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="108" class="col-name">dest_coords</text>
    <text x="95" y="108" class="col-type">DECIMAL(9,6)</text>

    <text x="12" y="128" class="col-name">rec_charge</text>
    <text x="95" y="128" class="col-type">DECIMAL(5,2)</text>

    <text x="12" y="148" class="col-name">expected_cost</text>
    <text x="95" y="148" class="col-type">DECIMAL(8,2)</text>

    <text x="12" y="168" class="col-name">wait_time_mins</text>
    <text x="95" y="168" class="col-type">INTEGER</text>

    <text x="12" y="188" class="col-name">user_action</text>
    <text x="95" y="188" class="col-type">VARCHAR(20)</text>
  </g>

  <g transform="translate(730, 390)" filter="url(#shadow)">
    <rect width="230" height="150" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <rect width="230" height="28" rx="8" fill="url(#header-green)"/>
    <rect y="20" width="230" height="8" fill="url(#header-green)"/>
    <text x="12" y="18" class="table-title">predictions</text>

    <text x="12" y="48" class="col-name">id</text>
    <text x="95" y="48" class="col-type">VARCHAR(36)</text>
    <text x="195" y="48" class="col-key">PK</text>

    <text x="12" y="68" class="col-name">vehicle_id</text>
    <text x="95" y="68" class="col-type">VARCHAR(36)</text>
    <text x="195" y="68" class="col-key" fill="#EC4899">FK</text>

    <text x="12" y="88" class="col-name">pred_type</text>
    <text x="95" y="88" class="col-type">VARCHAR(30)</text>

    <text x="12" y="108" class="col-name">pred_val</text>
    <text x="95" y="108" class="col-type">DECIMAL(10,4)</text>

    <text x="12" y="128" class="col-name">actual_val</text>
    <text x="95" y="128" class="col-type">DECIMAL(10,4)</text>
  </g>

  <g stroke="#475569" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M 145,220 V 270"/>
    <circle cx="145" cy="225" r="3" fill="#475569"/>
    
    <path d="M 145,460 V 500"/>
    <circle cx="145" cy="465" r="3" fill="#475569"/>

    <path d="M 250,365 H 390"/>
    <circle cx="255" cy="365" r="3" fill="#475569"/>

    <path d="M 500,260 V 310"/>
    <circle cx="500" cy="265" r="3" fill="#475569"/>

    <path d="M 250,420 H 330 V 290 H 730"/>
    <circle cx="255" cy="420" r="3" fill="#475569"/>

    <path d="M 610,185 H 730"/>
    <circle cx="615" cy="185" r="3" fill="#475569"/>

    <path d="M 250,440 H 360 V 590 H 710 V 465 H 730"/>
    <circle cx="255" cy="440" r="3" fill="#475569"/>
  </g>
</svg>
