<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="blue-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="indigo-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .column-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #F1F5F9; text-transform: uppercase; letter-spacing: 0.05em; text-anchor: middle; }
    .step-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 12px; font-weight: 600; fill: #E2E8F0; }
    .step-num { font-family: 'system-ui', -apple-system, sans-serif; font-size: 10px; font-weight: 800; fill: #020617; }
    .label { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 500; fill: #64748B; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — System Workflow</text>
  <text x="40" y="72" class="subtitle">End-to-End Route Optimization and Charging Recommendation Sequence</text>

  <g transform="translate(150, 110)">
    <line x1="0" y1="40" x2="0" y2="470" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="-80" y="0" width="160" height="40" rx="8" fill="url(#card-grad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="25" class="column-title" fill="#3B82F6">Driver App</text>
    <rect x="-8" y="60" width="16" height="370" rx="4" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  </g>

  <g transform="translate(420, 110)">
    <line x1="0" y1="40" x2="0" y2="470" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="-80" y="0" width="160" height="40" rx="8" fill="url(#card-grad)" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="25" class="column-title" fill="#10B981">Edge Engine</text>
    <rect x="-8" y="70" width="16" height="350" rx="4" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
  </g>

  <g transform="translate(680, 110)">
    <line x1="0" y1="40" x2="0" y2="470" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="-80" y="0" width="160" height="40" rx="8" fill="url(#card-grad)" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="25" class="column-title" fill="#E2E8F0">Local SQLite DB</text>
    <rect x="-8" y="150" width="16" height="80" rx="4" fill="#1E293B" stroke="#475569" stroke-width="1"/>
  </g>

  <g transform="translate(900, 110)">
    <line x1="0" y1="40" x2="0" y2="470" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4"/>
    <rect x="-80" y="0" width="160" height="40" rx="8" fill="url(#card-grad)" stroke="#6366F1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="25" class="column-title" fill="#6366F1">External APIs</text>
    <rect x="-8" y="100" width="16" height="240" rx="4" fill="#1E293B" stroke="#6366F1" stroke-width="1"/>
  </g>

  <g transform="translate(0, 180)">
    <path d="M 158,0 H 406" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    <rect x="180" y="-12" width="200" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="190" cy="-2" r="7" fill="#3B82F6"/>
    <text x="188" y="2" class="step-num" font-weight="900" fill="#F8FAFC">1</text>
    <text x="203" y="1" class="step-text">Request Plan (Dest, Target SoC)</text>
  </g>

  <g transform="translate(0, 220)">
    <path d="M 428,0 H 886" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow)"/>
    <rect x="480" y="-12" width="280" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="-2" r="7" fill="#94A3B8"/>
    <text x="488" y="2" class="step-num" fill="#F8FAFC">2</text>
    <text x="503" y="1" class="step-text">Query Routing Coords (Weather, Traffic, Slope)</text>
  </g>

  <g transform="translate(0, 250)">
    <path d="M 886,0 H 428" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <rect x="480" y="-12" width="280" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="-2" r="7" fill="#94A3B8"/>
    <text x="488" y="2" class="step-num" fill="#F8FAFC">3</text>
    <text x="503" y="1" class="step-text">Return Elevation &amp; Condition Feeds</text>
  </g>

  <g transform="translate(0, 280)">
    <path d="M 428,0 H 666" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    <rect x="450" y="-12" width="190" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="460" cy="-2" r="7" fill="#10B981"/>
    <text x="458" y="2" class="step-num" fill="#020617">4</text>
    <text x="473" y="1" class="step-text">Fetch Battery SOH / Temp logs</text>
  </g>

  <g transform="translate(0, 310)">
    <path d="M 666,0 H 428" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    <rect x="450" y="-12" width="190" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="460" cy="-2" r="7" fill="#10B981"/>
    <text x="458" y="2" class="step-num" fill="#020617">5</text>
    <text x="473" y="1" class="step-text">Return Calibration Histograms</text>
  </g>

  <g transform="translate(0, 350)">
    <path d="M 428,0 Q 480,10 428,20" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    <rect x="450" y="-3" width="220" height="26" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="460" cy="10" r="7" fill="#10B981"/>
    <text x="458" y="14" class="step-num" fill="#020617">6</text>
    <text x="473" y="13" class="step-text">Run Local SOH Estimator Model</text>
  </g>

  <g transform="translate(0, 400)">
    <path d="M 428,0 H 886" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <rect x="480" y="-12" width="280" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="-2" r="7" fill="#94A3B8"/>
    <text x="488" y="2" class="step-num" fill="#F8FAFC">7</text>
    <text x="503" y="1" class="step-text">Query Dynamic Stations (occupancy, connector)</text>
  </g>

  <g transform="translate(0, 430)">
    <path d="M 886,0 H 428" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <rect x="480" y="-12" width="280" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="490" cy="-2" r="7" fill="#94A3B8"/>
    <text x="488" y="2" class="step-num" fill="#F8FAFC">8</text>
    <text x="503" y="1" class="step-text">Return Active Charging Station parameters</text>
  </g>

  <g transform="translate(0, 470)">
    <path d="M 428,0 Q 480,10 428,20" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
    <rect x="450" y="-3" width="220" height="26" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="460" cy="10" r="7" fill="#10B981"/>
    <text x="458" y="14" class="step-num" fill="#020617">9</text>
    <text x="473" y="13" class="step-text">Optimize (Min Cost, Min Time, Max SOH)</text>
  </g>

  <g transform="translate(0, 510)">
    <path d="M 406,0 H 158" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
    <rect x="180" y="-12" width="200" height="20" rx="4" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="190" cy="-2" r="7" fill="#3B82F6"/>
    <text x="186" y="2" class="step-num" fill="#F8FAFC">10</text>
    <text x="203" y="1" class="step-text">Render Route Charge Strategy</text>
  </g>

  <text x="500" y="580" class="subtitle" text-anchor="middle">Sequence loops continuously at 0.1 Hz during driving to dynamically update suggestions as traffic/battery temperature changes.</text>
</svg>
