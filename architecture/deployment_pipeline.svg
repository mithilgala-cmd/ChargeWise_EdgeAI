<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="blue-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="green-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="orange-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10B981"/>
    </marker>
  </defs>

  <style>
    .title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 24px; font-weight: 700; fill: #F8FAFC; }
    .subtitle { font-family: 'system-ui', -apple-system, sans-serif; font-size: 14px; fill: #94A3B8; }
    .stage-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 15px; font-weight: 700; fill: #F1F5F9; }
    .node-title { font-family: 'system-ui', -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #E2E8F0; }
    .node-text { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
    .label { font-family: 'system-ui', -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #475569; }
  </style>

  <rect width="1000" height="650" rx="16" fill="url(#bg-grad)"/>

  <text x="40" y="50" class="title">ChargeWise EdgeAI — Deployment Pipeline</text>
  <text x="40" y="72" class="subtitle">OTA Update Delivery: Cloud Compiling, Quantization, Containerization, and Edge Hot-Reloading</text>

  <g transform="translate(40, 110)" filter="url(#shadow)">
    <rect width="250" height="480" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="250" height="35" rx="12" fill="url(#blue-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="250" y2="35" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="15" y="23" class="stage-title" fill="#3B82F6">1. Cloud Compiling</text>

    <g transform="translate(15, 60)">
      <rect width="220" height="85" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">GitHub Actions CI/CD</text>
      <text x="15" y="47" class="node-text">• Triggered on main release push</text>
      <text x="15" y="62" class="node-text">• Runs unit tests &amp; syntax checks</text>
    </g>

    <g transform="translate(15, 170)">
      <rect width="220" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">TFLite Optimizer Worker</text>
      <text x="15" y="47" class="node-text">• Post-Training Quantization</text>
      <text x="15" y="62" class="node-text">• Weight conversion to INT8</text>
      <text x="15" y="77" class="node-text">• Accuracy validation check</text>
    </g>

    <g transform="translate(15, 305)">
      <rect width="220" height="150" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">Docker Edge Registry</text>
      <text x="15" y="47" class="node-text">• AWS ECR Container Repo</text>
      <text x="15" y="62" class="node-text">• Combines model and runtimes</text>
      <text x="15" y="77" class="node-text">• Image size optimization</text>
      <text x="15" y="92" class="node-text">• Signs package security hash</text>
    </g>
  </g>

  <g transform="translate(370, 200)" filter="url(#shadow)">
    <rect width="260" height="290" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="260" height="35" rx="12" fill="url(#orange-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="260" y2="35" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="15" y="23" class="stage-title" fill="#F59E0B">2. OTA Manager Service</text>

    <g transform="translate(15, 60)">
      <rect width="230" height="200" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">AWS IoT Core Broker</text>
      <text x="15" y="50" class="node-text">• Pushes update alerts via MQTT</text>
      <text x="15" y="65" class="node-text">• Manages dynamic version rollouts</text>
      <text x="15" y="80" class="node-text">• Verifies network profiles (Wi-Fi)</text>
      <text x="15" y="95" class="node-text">• Throttles update delivery speed</text>
      <text x="15" y="110" class="node-text">• Validates edge hardware specs</text>
      <text x="15" y="125" class="node-text">• Enforces digital signatures</text>
    </g>
  </g>

  <g transform="translate(710, 110)" filter="url(#shadow)">
    <rect width="250" height="480" rx="12" fill="url(#card-grad)" stroke="#334155" stroke-width="1.5"/>
    <rect width="250" height="35" rx="12" fill="url(#green-highlight)" opacity="0.2"/>
    <line x1="0" y1="35" x2="250" y2="35" stroke="#10B981" stroke-width="1.5"/>
    <text x="15" y="23" class="stage-title" fill="#10B981">3. Edge Deployment</text>

    <g transform="translate(15, 60)">
      <rect width="220" height="85" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">Update Client Daemon</text>
      <text x="15" y="47" class="node-text">• Checks for updates on charging</text>
      <text x="15" y="62" class="node-text">• Validates package cryptohash</text>
    </g>

    <g transform="translate(15, 170)">
      <rect width="220" height="110" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">Dynamic Image Loader</text>
      <text x="15" y="47" class="node-text">• Downloads container slices</text>
      <text x="15" y="62" class="node-text">• Extracts model binary locally</text>
      <text x="15" y="77" class="node-text">• Standardizes folder pathing</text>
    </g>

    <g transform="translate(15, 305)">
      <rect width="220" height="150" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
      <text x="15" y="25" class="node-title">TFLite Runtime Interpreter</text>
      <text x="15" y="47" class="node-text">• Dynamic model hot-reload</text>
      <text x="15" y="62" class="node-text">• No service downtime reload</text>
      <text x="15" y="77" class="node-text">• Runs fallback models on crash</text>
      <text x="15" y="92" class="node-text">• Broadcasts success code to app</text>
    </g>
  </g>

  <path d="M 290,345 H 370" stroke="#3B82F6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="305" y="337" class="label" fill="#3B82F6">REGISTRY</text>

  <path d="M 630,345 H 710" stroke="#10B981" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="645" y="337" class="label" fill="#10B981">OTA PUSH</text>

  <path d="M 125,145 V 170" stroke="#94A3B8" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M 125,280 V 305" stroke="#94A3B8" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <path d="M 795,145 V 170" stroke="#94A3B8" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <path d="M 795,280 V 305" stroke="#94A3B8" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
</svg>
